services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      OPENAI_TOOL_MODE: ${OPENAI_TOOL_MODE:-function_fallback}
      OPENAI_MCP_SERVER_URL: ${OPENAI_MCP_SERVER_URL:-http://mcp:9000/mcp}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173}
    ports:
      - "8000:8000"

  mcp:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    ports:
      - "9000:9000"
