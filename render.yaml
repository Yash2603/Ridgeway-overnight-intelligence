services:
  - type: web
    name: ridgeway-api
    env: python
    rootDir: repo root
    buildCommand: pip install -r mcp_server/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: OPENAI_MODEL
        value: gpt-4.1
      - key: OPENAI_TOOL_MODE
        value: remote_mcp
      - key: OPENAI_MCP_SERVER_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BACKEND_CORS_ORIGINS
        sync: false

  - type: web
    name: ridgeway-mcp
    env: python
    rootDir: .
    buildCommand: pip install -r mcp_server/requirements.txt
    startCommand: python -m mcp_server.server
    healthCheckPath: /health
    envVars:
      - key: MCP_PATH
        value: /mcp
